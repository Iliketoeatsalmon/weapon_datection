model:
  model_path: "best.pt"   # <-- ใส่ path โมเดลของคุณ
  img_size: 640
  conf_th: 0.25           # ลด threshold ตอนทดสอบให้ติดง่ายขึ้น
  iou_th: 0.45
  weapon_names:
    - grenade
    - knife
    - pistol
    - rifle

video:
  source: 0               # 0 = webcam, หรือ "rtsp://..."
  width: 640
  height: 480

alert:
  cooldown_sec: 15        # หน่วงเวลาระหว่าง alert
  history_len: 10         # เก็บผลตรวจ N เฟรมล่าสุด
  min_weapon_frames: 1    # ต้องเจออาวุธอย่างน้อยกี่เฟรมใน history ถึงจะยิง alert

telegram:
  bot_token: "8165455610:AAEpBxpYMnA95-pjkIdBoQFug6xpUNuIAvY"
  chat_id: "8185692729"       # <-- แก้เป็น chat id จริง
  timeout: 10

logging:
  log_csv: "detections.csv"
  crop_dir: "crops"
  enable_crop_save: true

hud:
  show_window: true
  window_name: "Weapon Detection (Advanced)"
  font_scale: 0.6
  font_thickness: 2
